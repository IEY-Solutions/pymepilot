# Codex Configuration for PymePilot

model = "gpt-5.4"
model_reasoning_effort = "high"

# Approval and sandbox defaults are enforced globally in ~/.codex/config.toml.
# Keep project config focused on model choice and MCP servers.

[mcp_servers.context7]
enabled = true
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
startup_timeout_sec = 30
tool_timeout_sec = 60

[mcp_servers.notion]
  url = "https://mcp.notion.com/mcp"
  enabled = true
