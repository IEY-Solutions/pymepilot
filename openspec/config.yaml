schema: spec-driven

context: |
  Product: PymePilot — multi-tenant B2B SaaS for post-sale commercial intelligence and follow-up.
  Stack: Next.js 16 (App Router) + React 19 + TypeScript 5 (strict) + Tailwind CSS v4 (frontend)
         Python 3 with psycopg3 (backend engine)
         PostgreSQL with RLS multi-tenant (database)
         Supabase Auth (auth)
         Anthropic Claude API (AI engine)
  Architecture: Clean/Hexagonal in backend (engine/ has claude/, connectors/, core/, db/, push/, seguimiento/)
                App Router with Server Components in frontend
  Testing: Python unittest (standard library, no pytest) — 4 test files in backend/tests/
           SQL isolation tests in database/tests/
           No frontend test framework configured
           No coverage tool configured
  Style: Multi-tenant via tenant_id + RLS, Python backend orchestrator (main.py), ERP connectors read-only
  Conventions: AGENTS.md and PYMEPILOT-CORE.md as operating standards
               Spanish for docs/copy, English for code identifiers
               Anti-overfitting: IEY is evidence, not doctrine

